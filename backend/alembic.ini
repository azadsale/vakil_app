# =============================================================================
# Alembic Configuration — Legal-CoPilot
# =============================================================================

[alembic]
# Path to migration scripts
script_location = alembic

# Template for new revision files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Truncate slug to this length
truncate_slug_length = 40

# Timezone for revision timestamps
timezone = Asia/Kolkata

# Allow comparing server defaults in autogenerate
compare_server_default = true

# Prepend sys.path with this value during env.py execution
# Allows `alembic` CLI to find `app` package
prepend_sys_path = .

# ---------------------------------------------------------------------------
# Logging configuration
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S